<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Technician Scanner — Sin Chew Alarm</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0a0f1a;color:#fff;min-height:100vh}
header{background:#1F3A5F;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:2px solid rgba(204,0,0,.4)}
header .logo{width:36px;height:36px;flex-shrink:0}
header h1{color:#fff;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
header p{color:rgba(255,255,255,.5);font-size:10px;margin-top:1px}
.container{max-width:480px;margin:0 auto;padding:16px}
.scan-card{background:#111827;border:1px solid #1f2937;border-radius:16px;overflow:hidden;margin-bottom:14px}
.scan-header{background:#1F3A5F;padding:12px 16px;display:flex;align-items:center;gap:10px}
.scan-header .icon{font-size:20px}
.scan-header h2{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff}
.scan-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
#reader-wrap{position:relative;background:#000;aspect-ratio:1;overflow:hidden;transition:opacity .3s}
#reader-wrap.locked{opacity:.35;pointer-events:none}
#reader{width:100%!important}
#reader video{width:100%!important;height:100%!important;object-fit:cover}
.scan-overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.scan-frame{width:55%;aspect-ratio:1;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,0.55)}
.scan-corners{position:absolute;width:55%;aspect-ratio:1}
.scan-corners::before,.scan-corners::after,.scan-corners span::before,.scan-corners span::after{content:'';position:absolute;width:22px;height:22px;border-color:#CC0000;border-style:solid}
.scan-corners::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-corners::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-corners span::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-corners span::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;width:55%;height:2px;background:linear-gradient(90deg,transparent,#CC0000,transparent);animation:scanline 2.5s ease-in-out infinite}
@keyframes scanline{0%,100%{top:22.5%;opacity:0}10%,90%{opacity:1}50%{top:77.5%}}
.lock-banner{display:none;position:absolute;inset:0;background:rgba(0,0,0,.72);flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:2}
.lock-banner.show{display:flex}
.lock-banner span{font-size:28px}
.lock-banner p{font-size:13px;color:#aab8d0}
.scan-controls{padding:14px 16px;display:flex;gap:8px;align-items:center}
.svc-select{flex:1;background:#1f2937;border:1px solid #374151;border-radius:8px;color:#fff;padding:9px 11px;font-size:13px;outline:none}
.svc-select:focus{border-color:#CC0000}
.btn-cam{background:#1F3A5F;border:1px solid #CC0000;color:#CC0000;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-cam.active{background:#CC0000;color:#fff}
.btn-cam:hover{background:#CC0000;color:#fff}
.manual{padding:0 16px 14px}
.manual label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6b7280;display:block;margin-bottom:6px}
.manual-row{display:flex;gap:8px}
.manual input{flex:1;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:9px 12px;font-size:14px;color:#fff;font-family:monospace;outline:none;letter-spacing:1px;text-transform:uppercase}
.manual input::placeholder{text-transform:none;font-family:sans-serif;letter-spacing:0;color:#4b5563}
.manual input:focus{border-color:#CC0000}
.btn-scan{background:#CC0000;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-scan:disabled{opacity:.4;cursor:default}
/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-backdrop.open{display:flex}
.modal{width:100%;max-width:420px;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8);animation:modal-in .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes modal-in{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:20px 22px 16px;background:#1F3A5F;display:flex;align-items:flex-start;gap:12px}
.modal-icon{font-size:40px;line-height:1;flex-shrink:0}
.modal-title{font-size:20px;font-weight:800;color:#fff;line-height:1.1}
.modal-code{font-family:monospace;font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;letter-spacing:1px}
.modal-plan{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;margin-top:5px;letter-spacing:.5px}
.modal-body{background:#071829;padding:0 22px 6px;display:grid;gap:8px}
.modal-row{display:flex;align-items:flex-start;gap:12px;padding:9px 12px;background:rgba(255,255,255,.05);border-radius:9px}
.modal-row .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6b7280;width:88px;flex-shrink:0;padding-top:2px}
.modal-row .val{font-size:13px;font-weight:700;word-break:break-word;flex:1}
.push-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:5px 12px;border-radius:20px;font-weight:700;margin:6px 22px 0}
.push-ok{background:#064e3b;color:#6ee7b7}
.push-none{background:#1f2937;color:#6b7280}
/* Complete service button — the money button */
.complete-btn{margin:14px 22px 0;width:calc(100% - 44px);padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#CC0000,#8B0000);color:white;letter-spacing:.3px;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.complete-btn:hover{opacity:.88}
.complete-btn:disabled{opacity:.4;cursor:default}
.complete-btn.done{background:linear-gradient(135deg,#064e3b,#065f46);pointer-events:none}
.modal-dismiss{margin:10px 22px 22px;width:calc(100% - 44px);padding:12px;border:2px solid rgba(255,255,255,.15);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.7);background:transparent;letter-spacing:.3px;transition:border-color .2s}
.modal-dismiss:hover{border-color:rgba(255,255,255,.4)}
/* Red error / warning theme */
.modal.invalid .modal-header{background:#450a0a}.modal.invalid .modal-body{background:#1a0808}
.modal.warn .modal-header{background:#451a03}.modal.warn .modal-body{background:#1a0e05}
/* History */
#history-wrap{margin-top:6px}
.history-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4b5563;margin-bottom:8px}
.history-item{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;font-size:12px}
.hi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hi-dot.ok{background:#22c55e}.hi-dot.done{background:#f59e0b}.hi-dot.fail{background:#ef4444}
.hi-name{flex:1;font-weight:600;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-code{font-family:monospace;font-size:10px;color:#6b7280}
.hi-time{font-size:10px;color:#4b5563;white-space:nowrap}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:16px;font-size:11px;color:#374151}
footer a{color:#CC0000;text-decoration:none}
</style>
</head>
<body>
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-icon" id="m-icon"></div>
      <div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-code" id="m-code"></div>
        <span class="modal-plan" id="m-plan" style="display:none"></span>
      </div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div id="m-push"></div>
    <button class="complete-btn" id="complete-btn" style="display:none" onclick="completeService()">🔧 Complete Service &amp; Update Pass</button>
    <button class="modal-dismiss" id="m-dismiss" onclick="dismissModal()">Dismiss &amp; Scan Next</button>
  </div>
</div>

<header>
  <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="100" fill="#1F3A5F"/><circle cx="100" cy="100" r="92" fill="none" stroke="#CC0000" stroke-width="3"/><rect x="70" y="55" width="60" height="90" rx="4" fill="#CC0000"/><rect x="80" y="65" width="18" height="18" rx="2" fill="#1F3A5F"/><rect x="102" y="65" width="18" height="18" rx="2" fill="#1F3A5F"/><rect x="80" y="88" width="18" height="18" rx="2" fill="#1F3A5F"/><rect x="102" y="88" width="18" height="18" rx="2" fill="#1F3A5F"/><rect x="85" y="111" width="30" height="34" rx="2" fill="#1F3A5F"/><text x="100" y="170" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="2">SIN CHEW ALARM</text></svg></div>
  <div><h1>Sin Chew Alarm</h1><p>Technician Scanner</p></div>
</header>

<div class="container">
  <div class="scan-card">
    <div class="scan-header"><div class="icon">🔧</div><div><h2>Technician Scanner</h2><p>Scan customer pass QR code</p></div></div>
    <div id="reader-wrap">
      <div id="reader"></div>
      <div class="scan-overlay"><div class="scan-frame"></div><div class="scan-corners"><span></span></div><div class="scan-line"></div></div>
      <div class="lock-banner" id="lock-banner"><span>🔒</span><p>Dismiss result to scan next pass</p></div>
    </div>
    <div class="scan-controls">
      <select class="svc-select" id="svc-sel">
        <option value="Routine Maintenance">🔧 Routine Maintenance</option>
        <option value="Fault Call">⚠️ Fault Call</option>
        <option value="Installation">🔌 Installation</option>
        <option value="Inspection">🔍 Inspection</option>
        <option value="Battery Replacement">🔋 Battery Replacement</option>
        <option value="Upgrade">⬆️ Upgrade</option>
      </select>
      <button class="btn-cam active" id="cam-btn" onclick="toggleCam()">Stop Cam</button>
    </div>
    <div class="manual">
      <label>Manual code entry</label>
      <div class="manual-row">
        <input type="text" id="code-input" placeholder="PASS-XXXXXXXX" maxlength="14" autocomplete="off" autocorrect="off" spellcheck="false" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')">
        <button class="btn-scan" id="scan-btn" onclick="submitCode()">Scan</button>
      </div>
    </div>
  </div>
  <div id="history-wrap"><div class="history-title">Service History (This Session)</div><div id="history"></div></div>
</div>
<footer><a href="./">← Portal</a> &nbsp;·&nbsp; <a href="dashboard.html">Dashboard</a> &nbsp;·&nbsp; &copy; 2026 Sin Chew Alarm</footer>

<script>
const SCAN_URL = 'https://gyllfnsnniuqaarsulsk.supabase.co/functions/v1/sinchew-scan';
let scanner = null, camRunning = false, modalOpen = false, processing = false;
let currentPassId = null, currentCode = null;
const scanHistory = [];

window.addEventListener('DOMContentLoaded', () => startCam());

async function startCam() {
  try {
    scanner = new Html5Qrcode('reader');
    await scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 }, onQRDetected, () => {});
    camRunning = true;
    document.getElementById('cam-btn').textContent = 'Stop Cam';
    document.getElementById('cam-btn').classList.add('active');
  } catch {
    document.getElementById('reader-wrap').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#4b5563;font-size:13px;text-align:center;padding:20px">Camera not available.<br>Use manual entry below.</div>';
    document.getElementById('cam-btn').style.display = 'none';
  }
}
async function stopCam() {
  if (scanner && camRunning) { await scanner.stop(); scanner = null; camRunning = false;
    document.getElementById('cam-btn').textContent = 'Start Cam';
    document.getElementById('cam-btn').classList.remove('active'); }
}
async function toggleCam() { if (camRunning) await stopCam(); else await startCam(); }

async function onQRDetected(code) {
  if (modalOpen || processing || !code.startsWith('PASS-')) return;
  document.getElementById('code-input').value = code;
  await submitCode(code);
}

async function submitCode(codeOverride) {
  if (modalOpen || processing) return;
  const code = (codeOverride || document.getElementById('code-input').value).trim().toUpperCase();
  if (!code || !code.startsWith('PASS-')) { openErrorModal('Enter a valid pass code (PASS-XXXXXXXX)'); return; }
  processing = true; lockUI(true);
  const svc = document.getElementById('svc-sel').value;
  try {
    const res  = await fetch(SCAN_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ code, service_type: svc }) });
    const data = await res.json();
    currentCode = code; currentPassId = data.pass_id || null;
    buildModal(code, data);
  } catch(e) { openErrorModal('Network error — ' + (e.message || 'try again')); }
  finally { processing = false; }
}

function buildModal(code, data) {
  if (!data.success) {
    const expired = data.status === 'expired', revoked = data.status === 'revoked';
    const theme = (expired || revoked) ? 'invalid' : 'warn';
    openModal(theme, expired ? '⏰' : revoked ? '🚫' : '❌',
      expired ? 'Pass Expired' : revoked ? 'Pass Revoked' : 'Invalid Pass', code,
      [['Reason', data.error || data.status || 'Unknown']].concat(data.holder_name ? [['Customer', data.holder_name]] : []),
      '', false);
    addHistory(code, data.holder_name || 'Unknown', 'fail'); return;
  }
  const rows = [];
  if (data.plan_tier)       rows.push(['Plan',         data.plan_tier]);
  if (data.next_service_date) rows.push(['Next Service', data.next_service_date]);
  if (data.service_address) rows.push(['Address',      data.service_address]);
  if (data.account_manager) rows.push(['Acct Mgr',     data.account_manager]);
  if (data.contract_expiry) rows.push(['Contract',     'Expires ' + data.contract_expiry]);
  const svcParts = (data.last_service || '').split(' · ');
  if (svcParts[1]) rows.push(['Time', svcParts.slice(1).join(' · ')]);
  rows.push(['Scans', String(data.scan_sequence || 1)]);
  const pushHtml = data.push?.succeeded > 0
    ? `<div class="push-badge push-ok">📱 Wallet updated · ${data.push.succeeded} device${data.push.succeeded > 1 ? 's' : ''}</div>`
    : `<div class="push-badge push-none">📱 No wallet devices registered</div>`;
  openModal('valid', '✅', data.holder_name || 'Valid Pass', code, rows, pushHtml, true, data.plan_tier);
  addHistory(code, data.holder_name || 'Unknown', 'ok');
}

function openModal(theme, icon, title, code, rows, extraHtml = '', showComplete = false, planTier = '') {
  const modal = document.getElementById('modal');
  modal.className = 'modal' + (theme !== 'valid' ? ' ' + theme : '');
  document.getElementById('m-icon').textContent  = icon;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-code').textContent  = code;
  const planEl = document.getElementById('m-plan');
  if (planTier) {
    planEl.textContent = planTier;
    planEl.style.display = 'inline-block';
    const colors = { Premium: ['#CC0000','#fff'], Standard: ['#1F3A5F','#fff'], Basic: ['#374151','#fff'] };
    const [bg, fg] = colors[planTier] || ['#374151','#fff'];
    planEl.style.background = bg; planEl.style.color = fg;
  } else { planEl.style.display = 'none'; }
  document.getElementById('m-body').innerHTML = rows.map(([l,v]) => `<div class="modal-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join('');
  document.getElementById('m-push').innerHTML = extraHtml;
  const completeBtn = document.getElementById('complete-btn');
  completeBtn.style.display = showComplete ? 'flex' : 'none';
  completeBtn.disabled = false;
  completeBtn.className = 'complete-btn';
  completeBtn.innerHTML = '🔧 Complete Service &amp; Update Pass';
  document.getElementById('modal-backdrop').classList.add('open');
  modalOpen = true; showLockBanner(true);
  document.getElementById('code-input').value = '';
  setTimeout(() => document.getElementById('m-dismiss').focus(), 50);
}

function openErrorModal(msg) {
  openModal('warn','⚠️','Scanner Error','—',[['Detail',msg]],'',false);
}

async function completeService() {
  if (!currentCode) return;
  const btn = document.getElementById('complete-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Updating pass…';
  const svc = document.getElementById('svc-sel').value;
  try {
    const res  = await fetch(SCAN_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ code: currentCode, service_type: svc, complete_service: true }) });
    const data = await res.json();
    if (data.success && data.new_next_service) {
      btn.className = 'complete-btn done';
      btn.innerHTML = `✅ Service complete! Next service: ${data.new_next_service}`;
      // Update the modal rows
      const body = document.getElementById('m-body');
      const rows = body.querySelectorAll('.modal-row');
      rows.forEach(r => {
        const lbl = r.querySelector('.lbl');
        if (lbl && lbl.textContent === 'Next Service') r.querySelector('.val').textContent = data.new_next_service;
      });
      const pushEl = document.getElementById('m-push');
      pushEl.innerHTML = data.push?.succeeded > 0
        ? `<div class="push-badge push-ok">📱 Pass updated on ${data.push.succeeded} device${data.push.succeeded > 1 ? 's' : ''} — customer sees new date</div>`
        : `<div class="push-badge push-none">📱 No wallet devices registered</div>`;
      addHistory(currentCode, document.getElementById('m-title').textContent, 'done');
    } else {
      btn.innerHTML = '⚠️ Update failed — check logs';
    }
  } catch(e) { btn.innerHTML = '⚠️ ' + e.message; }
}

function dismissModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  modalOpen = false; showLockBanner(false); lockUI(false);
  currentPassId = null; currentCode = null;
}
document.getElementById('modal-backdrop').addEventListener('click', function(e) { if (e.target === this) dismissModal(); });
function lockUI(lock) {
  const btn = document.getElementById('scan-btn');
  btn.disabled = lock; btn.textContent = lock ? 'Scanning…' : 'Scan';
  document.getElementById('code-input').disabled = lock;
  document.getElementById('svc-sel').disabled = lock;
}
function showLockBanner(show) {
  document.getElementById('lock-banner').classList.toggle('show', show);
  document.getElementById('reader-wrap').classList.toggle('locked', show);
}
function addHistory(code, name, type) {
  const now = new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Singapore' });
  const labels = { ok: 'Scanned', done: '✅ Completed', fail: 'Failed' };
  scanHistory.unshift({ code, name, type, time: now, label: labels[type] || '' });
  if (scanHistory.length > 20) scanHistory.pop();
  document.getElementById('history').innerHTML = scanHistory.map(h =>
    `<div class="history-item"><div class="hi-dot ${h.type}"></div><div class="hi-name">${h.name}</div><div style="font-size:10px;color:${h.type==='done'?'#f59e0b':'#6b7280'}">${h.label}</div><div class="hi-code">${h.code}</div><div class="hi-time">${h.time}</div></div>`
  ).join('');
}
</script>
</body></html>
